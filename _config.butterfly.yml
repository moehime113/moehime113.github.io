# --------------------------------------
# Butterfly Theme Configuration
# Docs: https://butterfly.js.org/
# --------------------------------------

# Navigation
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  更多||fas fa-list||hide:
    音乐: /music/ || fas fa-music
    影视: /movies/ || fas fa-video
    图片: /photos/ || fas fa-image
  友链: /link/ || fas fa-link
  关于: /about/ || fas fa-heart

# Code blocks
code_blocks:
  theme: darker
  copy: true
  shrink: true
  height_limit: 200

# Social
social:
  fab fa-github: https://github.com/moehime113 || GitHub
  fab fa-envelope: mailto:1014368305@qq.com || Email

# Global images
favicon: /img/favicon.ico
index_img: https://source.fomal.cc/img/index_bg.webp
default_top_img: https://source.fomal.cc/img/post_bg.webp
background: https://source.fomal.cc/img/bg.webp

# A simple 404 page
error_404:
  enable: true
  subtitle: 页面没有找到
  background: https://source.fomal.cc/img/404_bg.webp

# Cover
cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:
    - https://source.fomal.cc/img/default_cover_1.webp
    - https://source.fomal.cc/img/default_cover_2.webp
    - https://source.fomal.cc/img/default_cover_3.webp

# Author avatar
avatar:
  img: /img/head.jpg
  effect: false

# Post meta
post_meta:
  page:
    date_type: both
    date_format: relative
    categories: true
    tags: true
    label: true
  post:
    date_type: both
    date_format: relative
    categories: true
    tags: true
    label: true

# Post settings
post_copyright:
  enable: true
  decode: true
  author_href: https://github.com/moehime113
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

reward:
  enable: true
  QR_code:
    - img: /img/wechat_pay.png
      link:
      text: wechat
    - img: /img/alipay.jpg
      link:
      text: alipay

toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false

related_post:
  enable: true
  limit: 6
  date_type: created

# 1 means next/prev links in chronological order
post_pagination: 1

copy:
  enable: true
  copyright:
    enable: true
    limit_count: 100

# Footer
footer:
  owner:
    enable: true
    since: 2026
  copyright:
    enable: false
  custom_text: Powered by Hexo & Butterfly

# Display mode
darkmode:
  enable: false
  button: true

readmode: true

# Aside
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_recent_post:
    enable: true
  card_newest_comments:
    enable: true
    limit: 6
    storage: 10
    avatar: true
  card_webinfo:
    enable: true
    runtime_date: 2026-04-16

busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# Effects and UI
activate_power_mode:
  enable: false
  colorful: true
  shake: true
  mobile: false

footer_bg: true

canvas_fluttering_ribbon:
  enable: true
  mobile: true

fireworks:
  enable: true
  zIndex: 9999
  mobile: false

font:
  global_font_size: 15px
  code_font_size: 14px
  font_family: Microsoft YaHei, sans-serif
  code_font_family: Source Code Pro, monospace

blog_title_font:
  font_link:
  font_family: var(--font-family-blog-title)

subtitle:
  enable: true
  effect: true

preloader:
  enable: true
  source: 1

wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# Choose: fancybox / medium_zoom
lightbox: fancybox

pjax:
  enable: true
  exclude:
    - /archives/
    - /tags/
    - /categories/
    - /link/
    - /about/

inject:
  head:
    - <link rel="icon" href="/img/favicon.ico">
  bottom:
    - <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    - <script>particlesJS.load('particles-js', '/particles.json', function () { console.log('particles.js loaded - callback') })</script>

# Search
search:
  use: local_search
  local_search:
    preload: false
    top_n_per_article: 1