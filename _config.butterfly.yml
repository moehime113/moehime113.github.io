# --------------------------------------
# Butterfly Theme Configuration
# Docs: https://butterfly.js.org/
# --------------------------------------

menu:
  首页: / || icon-shouye || faa-tada
  归档: /archives || icon-guidang || faa-tada
  分类: /categories || icon-fenlei || faa-tada
  标签: /tags || icon-biaoqian || faa-tada
  更多 || icon-more-br || faa-tada || hide:
    音乐: /music/ || icon-yinle || faa-tada
    电影: /movies/ || icon-dianying || faa-tada
    留言: /comments/ || icon-pinglun || faa-tada
  友链: /link/ || icon-youlianguanli || faa-tada
  关于: /about/ || icon-guanyu || faa-tada
# Code blocks
code_blocks:
  theme: darker
  copy: true
  shrink: true
  height_limit: 200

# Social
social:
  fab fa-github: https://github.com/moehime113 || GitHub
  fab fa-weixin: /img/wechat.jpg || 微信 || '#07C160'
  fab fa-qq: /img/qq.jpg || QQ || '#12B7F5'
  fab fa-bilibili: https://space.bilibili.com/1978757278 || B站 || '#FB7299'

# Global images
favicon: /img/favicon.ico
index_img: /img/cover1.jpg
default_top_img: /img/cover2.jpg
background: url(/img/black1.jpg)

# A simple 404 page
error_img:
  post_page: /img/404.jpg

error_404:
  enable: true
  subtitle: 页面没有找到

# Cover
cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:
    - https://source.fomal.cc/img/default_cover_1.webp
    - https://source.fomal.cc/img/default_cover_2.webp
    - https://source.fomal.cc/img/default_cover_3.webp

# Author avatar
avatar:
  img: /img/head.jpg
  effect: false

# Post meta
post_meta:
  page:
    date_type: both
    date_format: relative
    categories: true
    tags: true
    label: true
  post:
    date_type: both
    date_format: relative
    categories: true
    tags: true
    label: true

# Post settings
post_copyright:
  enable: true
  decode: true
  author_href: https://github.com/moehime113
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

reward:
  enable: false
  QR_code:
    - img: /img/wechat_pay.png
      link:
      text: wechat
    - img: /img/alipay.jpg
      link:
      text: alipay

toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false

related_post:
  enable: true
  limit: 6
  date_type: created

# 1 means next/prev links in chronological order
post_pagination: 1

copy:
  enable: true
  copyright:
    enable: true
    limit_count: 100

# Footer
footer:
  enable: true
  owner:
    enable: true
    start_year: 2026
    name: Echo 🎯
  copyright:
    enable: false

  custom_text: |
    <div style="display:flex;align-items:center;justify-content:center;gap:16px;font-size:14px;margin-top:8px;">
      Powered by Hexo & Butterfly &nbsp; | &nbsp;
    </div>
  runtime:
    enable: false
 

# Display mode
darkmode:
  enable: true
  button: true

readmode: true

# Aside
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_recent_post:
    enable: true
  card_newest_comments:
    enable: true
    limit: 6
    storage: 10
    avatar: true
  card_webinfo:
    enable: true
    runtime_date: 2026-04-16

busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# ------------------------------
# 视觉效果与界面细节
# ------------------------------
activate_power_mode:
  enable: false
  colorful: true
  shake: true
  mobile: false

# 页脚背景交给 source/css/custom.css 单独设计，避免和页面背景共享
footer_bg: false

canvas_fluttering_ribbon:
  enable: true
  mobile: true

fireworks:
  enable: false
  zIndex: 9999
  mobile: false

subtitle:
  enable: true
  effect: true

preloader:
  enable: true
  source: 1

wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# Choose: fancybox / medium_zoom
lightbox: fancybox

pjax:
  enable: true
  exclude:
    - /archives/
    - /tags/
    - /categories/
    - /link/
    - /about/

inject:
  head:
    - <link rel="icon" href="/img/favicon.ico">
    - <link rel="stylesheet" href="/css/custom.css">
    - <link rel="stylesheet" href="/css/universe.css">
    - <link rel="stylesheet" href="//at.alicdn.com/t/c/font_5162321_02l435p6df9.css" media="defer" onload="this.media='all'">
    - <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/l-lin/font-awesome-animation/dist/font-awesome-animation.min.css" media="defer" onload="this.media='all'">
  bottom:
    - <canvas id="universe"></canvas>
    - <script defer src="/js/universe.js"></script>
    - <script async src="//at.alicdn.com/t/c/font_5162321_02l435p6df9.js"></script>
# ------------------------------
# 站内搜索
# ------------------------------
search:
  use: local_search
  local_search:
    preload: false
    top_n_per_article: 1

# ------------------------------
# 信笺式留言板（Violet）
# 建议仅在 /comments/ 页面显示，避免干扰普通文章页。
# ------------------------------
envelope_comment:
  enable: true
  enable_page: /comments/
  custom_pic:
    cover: https://cdn.jsdelivr.net/npm/hexo-butterfly-envelope/lib/violet.jpg
    line: https://cdn.jsdelivr.net/npm/hexo-butterfly-envelope/lib/line.png
    beforeimg: https://cdn.jsdelivr.net/npm/hexo-butterfly-envelope/lib/before.png
    afterimg: https://cdn.jsdelivr.net/npm/hexo-butterfly-envelope/lib/after.png
  message:
  author: Echo
  header: 给我留个脚印吧 💌
  content: 欢迎来到我的小站！<br>不管是建议、吐槽还是单纯的问候，都可以在这里留下你的足迹~
  btn_text: 发送留言
  style:
    index: bottom
    post: bottom
    page: bottom

# ------------------------------
# 页脚增强
# ------------------------------
footer_beautify:
  enable:
    timer: false  # 关闭计时器
    bdage: false  # 关闭徽标
  priority: 5
  enable_page: all
  layout:
    type: id
    name: footer
    index: 0


  # 首页分类磁贴(店长同款)
categoryBar:
  enable: true
  priority: 5
  enable_page: /
  layout:
    type: id
    name: recent-posts
    index: 0
  column: odd
  row: 1
  message:
    - descr: 二次元
      cover: https://picsum.photos/id/1/600/300
    - descr: 技术教程
      cover: https://picsum.photos/id/2/600/300
    - descr: 生活随笔
      cover: https://picsum.photos/id/3/600/300
    - descr: 学习笔记
      cover: https://picsum.photos/id/4/600/300
    - descr: 动漫分享
      cover: https://picsum.photos/id/5/600/300
    - descr: 游戏日常
      cover: https://picsum.photos/id/6/600/300
  custom_css: https://cdn.jsdelivr.net/npm/hexo-butterfly-categories-card@1.0.0/lib/categorybar.css

  # 文章置顶轮播海报
swiper:
  enable: true
  priority: 5
  enable_page: /
  timemode: date
  layout:
    type: id
    name: recent-posts
    index: 0
  default_descr: 欢迎来到我的二次元小窝！✨
  swiper_css: https://cdn.jsdelivr.net/npm/hexo-butterfly-swiper/lib/swiper.min.css
  swiper_js: https://cdn.jsdelivr.net/npm/hexo-butterfly-swiper/lib/swiper.min.js
  custom_css: https://cdn.jsdelivr.net/npm/hexo-butterfly-swiper/lib/swiperstyle.css
  custom_js: https://cdn.jsdelivr.net/npm/hexo-butterfly-swiper/lib/swiper_init.js

font:
  global-font-size: '15px'
  code-font-size: '14px'
  font-family: YSHST, -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Lato, Roboto, "PingFang SC", "Microsoft JhengHei", "Microsoft YaHei", sans-serif
  code-font-family: Consolas, YSHST, "Microsoft YaHei", Menlo, "PingFang SC", "Microsoft JhengHei", sans-serif

blog_title_font:
  font_link:
  font-family: YSHST, -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Lato, Roboto, "PingFang SC", "Microsoft JhengHei", "Microsoft YaHei", sans-serif

# WOWJS 滚动动画（店长同款）
wowjs:
  enable: true
  priority: 10
  mobile: true # 手机端也开启动画（更美观）
  animateitem:
    - class: recent-post-item # 文章卡片
      style: animate__fadeInUp # 从下往上淡入
      duration: 0.8s
      delay: 0s
      offset: 100
    - class: card-widget # 侧边栏卡片
      style: animate__zoomIn # 放大进入
      duration: 0.8s
    - class: categoryBar-item # 分类磁贴卡片
      style: animate__fadeIn
      duration: 0.8s
    - class: #pagination
      style: animate__fadeIn
      duration: 1s
  animate_css: https://cdn.jsdelivr.net/npm/hexo-butterfly-wowjs/lib/animate.min.css
  wow_js: https://cdn.jsdelivr.net/npm/hexo-butterfly-wowjs/lib/wow.min.js
  wow_init_js: https://cdn.jsdelivr.net/npm/hexo-butterfly-wowjs/lib/wow_init.js

# ================================
# 店长外挂标签（稳定精简版）
# ================================

tag_plugins:
  enable: true
  priority: 5
  issues: false

  link:
    placeholder: https://at.alicdn.com/t/c/font_4406796_7o485bwrf9i.svg

  CDN:
    anima: false
    jquery: false
    issues: false
    iconfont: false
    carousel: false
    tag_plugins_css: https://npm.elemecdn.com/hexo-butterfly-tag-plugins-plus@1.3.5/lib/tag_plugins.css



